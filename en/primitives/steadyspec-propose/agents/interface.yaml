interface:
  display_name: "SDD Propose"
  short_description: "Create SDD proposal artifacts, with governed path when risky"
  default_prompt: "Create proposal, design, spec, issue, or task artifacts from clear intent. For consequential work, first distinguish Authorized Outcome, Hard Constraints, Challengeable Assumptions, Proposed Means, Delegated Decisions, Challenge Resolution, and ready-or-needs-human status; do not freeze the prompt as one authority statement. Use the governed proposal path first when direction, boundary, validation, or architecture can drift."
