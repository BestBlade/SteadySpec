interface:
  display_name: "SDD Workflow"
  short_description: "Route generic proof-gated SDD work"
  default_prompt: "Route this SDD change by checking existing artifacts, including whether consequential work has a ready delegation boundary that distinguishes Authorized Outcome, Hard Constraints, Challengeable Assumptions, Proposed Means, Delegated Decisions, and Challenge Resolution. Never guess missing ownership from one intent string. Any propose route must run `steadyspec delegation-path-check` against the code-derived substrate/change base/change ID/active root before its first artifact write; non-zero, identity drift, or a linked/junction component stops with zero proposal writes. After proposal writing, require `steadyspec delegation-check --change <repo-relative-change-path> --phase proposal --json` before routing to apply; a missing/non-zero result routes back to propose and is not semantic acceptance. Then choose the next skill, human decision needs, strategy rollup needs, and stop condition."
