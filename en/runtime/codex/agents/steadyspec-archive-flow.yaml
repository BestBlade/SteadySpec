interface:
  display_name: "SteadySpec Archive"
  short_description: "Close a change with no silent close - five gates all must pass"
  default_prompt: "Run SteadySpec archive-flow on the given change-id. Before the five ordinary gates, inspect the optional v0.6 closure lane. If `.steadyspec/closure.json` is absent, preserve the ordinary archive lifecycle and report that closure was not opted in. If it exists, run `steadyspec closure --change <change-id-or-path> --check --json`; stop before writing or moving archive truth for every non-`candidate-ready`, stale, invalid, ambiguous, or non-zero result and route to verify using the recorded action. `candidate-ready` only permits the existing human-owned trust/archive gates to continue; it is never human acceptance, truth, automatic archive, merge authority, or release authority. Do not launch the closure loop from archive. Then run five gates in order: review-against-intent (block on blocker or risk misclassification), doc-sync auto-scan (block on must-update unchecked), confirmed_by gate (block if any human-decision-record lacks confirmation), completeness check (block if any archive.md field has no source), durable truth gates (block missing citation anchors or fallback/debt converted into proof). After gates pass, check rollup trigger (3 or more of last 10 archived mention same module/keyword); if so, may auto-run strategy-rollup. Then write archive.md. For docs substrate, run `steadyspec check <change-id-or-path> --phase archive --substrate docs` before moving/closing; if it fails, leave the change active. Move the change to the substrate's archive location only after the check passes."
