interface:
  display_name: "SteadySpec Archive"
  short_description: "Close a change with no silent close - five gates all must pass"
  default_prompt: "Run SteadySpec archive-flow on the given change-id. On every substrate, first require a ready structured Delegation Boundary and a current trust-checkpoint whose Intent Match, Delegation Review, Evidence Credibility, Risk Routing Review, and Debt/Fallback Visibility are all pass, with Recommended Next archive; resolved authority refs must be portable change-relative path.md#anchor references whose targets/headings are read back inside the change. Missing/non-ready/unresolved/unbound delegation, a missing checkpoint, any gap/blocked/misclassified trust gate, or any other next action stops and routes to verify. Run `steadyspec delegation-check --change <repo-relative-change-path> --phase archive --json` before rendering or moving archive truth and stop on non-zero; the archive transaction independently binds and rechecks the direct proposal/trust fingerprint on commit and recovery. Then inspect the optional v0.6 closure lane. If `.steadyspec/closure.json` is absent, report that closure was not opted in; if present, run `steadyspec closure --change <change-id-or-path> --check --json` and stop before writing or moving archive truth for every non-`candidate-ready`, stale, invalid, ambiguous, or non-zero result. `candidate-ready` only permits the human-owned archive gates to continue; it is never human acceptance, truth, automatic archive, merge, or release authority. Do not launch closure from archive. Then run five gates: review-against-intent, doc-sync, confirmed_by, completeness, durable truth; each failure stops. After gates pass, check rollup, then write archive.md. For docs substrate, also run `steadyspec check <change-id-or-path> --phase archive --substrate docs` before moving for deterministic target/heading enforcement; this is defense in depth, not the only delegation gate."
