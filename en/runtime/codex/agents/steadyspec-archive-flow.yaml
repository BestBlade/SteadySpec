interface:
  display_name: "SteadySpec Archive"
  short_description: "Close a change with no silent close - five gates all must pass"
  default_prompt: "Run SteadySpec archive-flow on the given change-id. Run five gates in order: review-against-intent (block on blocker or risk misclassification), doc-sync auto-scan (block on must-update unchecked), confirmed_by gate (block if any human-decision-record lacks confirmation), completeness check (block if any archive.md field has no source), durable truth gates (block missing citation anchors or fallback/debt converted into proof). After gates pass, check rollup trigger (3 or more of last 10 archived mention same module/keyword); if so, may auto-run strategy-rollup. Then write archive.md and move the change to the substrate's archive location."
