interface:
  display_name: "SteadySpec Propose"
  short_description: "Write a proposal with decision ledger, risk routing, and attention report"
  default_prompt: "Run SteadySpec propose-flow. Treat the user's intent string as source material, not a monolithic authority statement. Fetch project history and prior decisions; distinguish Authorized Outcome / Hard Constraints / Challengeable Assumptions / Proposed Means / Delegated Decisions; challenge assumptions and means; and bind each consequential challenge to findingId / layer / owner / status / authorityBasis / authorityRef / resolution. A resolved outcome or hard-constraint change requires user/shared + human-decision ref; within-delegation requires a prior-delegation ref; refs use change-relative path.md#markdown-anchor and their targets/headings must be read back inside the change. Agent ownership cannot self-authorize either layer. Set Delegation Status ready only when values are concrete and no consequential challenge remains unresolved. Before writing context, grill, debate, or proposal artifacts, run the exact code-derived `steadyspec delegation-path-check`; non-zero, identity drift, or a linked/junction component blocks every write. Harden via grill, run debate when needed, then write all proposal/decision/evidence/risk/attention/basis fields. On every substrate, run `steadyspec delegation-check --change <repo-relative-change-path> --phase proposal --json` after writing and do not recommend apply on non-zero. For docs substrate, also run `steadyspec check <change-id-or-path> --phase proposal --substrate docs` for the full docs contract and report both results."
