interface:
  display_name: "SteadySpec Verify"
  short_description: "Run a trust checkpoint before archive, handoff, or risky continuation"
  default_prompt: "Run SteadySpec verify-flow on the given change-id. Compare output against Authorized Outcome/Hard Constraints, confirm changed assumptions/means stayed inside Delegated Decisions, and validate structured challenge authority refs: resolved outcome/constraint needs user/shared human-decision; within-delegation needs prior-delegation; refs use change-relative path.md#markdown-anchor and every target/heading must be read back inside the change. Missing/non-ready/placeholder/self-authorized/malformed/unbound delegation is blocked. On every substrate, run `steadyspec delegation-check --change <repo-relative-change-path> --phase verify --json`; non-zero blocks verified/archive recommendations and this remains structural readback rather than semantic truth or actor authentication. Any blocked trust dimension, or misclassified Delegation/Risk Routing Review, must force re-open-intent or stop and a blocked top-level result; archive requires all five trust dimensions pass. Separately review evidence, ownership, risk, and debt/fallback. If `.steadyspec/closure.json` exists, run `steadyspec closure --change <change-id-or-path> --check --json`: every non-`candidate-ready` result blocks an archive recommendation and its recorded next action must be followed; `candidate-ready` only continues this ordinary human-owned trust checkpoint and is never acceptance, truth, merge, release, or archive authority. If closure config is absent, preserve ordinary verify behavior and report that closure was not opted in. Do not archive or move the change. After writing trust-checkpoint.md, rerun delegation-check verify and require exact Change/five-gate/Recommended-Next readback; missing or mismatched persistence blocks verified. For docs substrate, also require `steadyspec check <change-id-or-path> --phase verify --substrate docs` to pass."
