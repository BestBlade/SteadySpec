interface:
  display_name: "SteadySpec Verify"
  short_description: "Run a trust checkpoint before archive, handoff, or risky continuation"
  default_prompt: "Run SteadySpec verify-flow on the given change-id. Compare current output against original intent, review evidence credibility, check decision ownership and risk routing, preserve debt/fallback visibility, and recommend exactly one next safest action: continue, archive, handoff, re-open-intent, or stop. If `.steadyspec/closure.json` exists, run `steadyspec closure --change <change-id-or-path> --check --json`: a non-`candidate-ready` result blocks an archive recommendation and its recorded next action must be followed; `candidate-ready` is bounded machine readiness that only continues the ordinary human trust checkpoint, never acceptance, truth, merge, release, or archive authority. If closure config is absent, preserve ordinary verify behavior and report that closure was not opted in. Do not write archive.md or move the change. For docs substrate, run `steadyspec check <change-id-or-path> --phase verify --substrate docs` after writing trust-checkpoint.md and report the result."
