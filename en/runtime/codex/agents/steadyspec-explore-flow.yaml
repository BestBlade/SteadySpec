interface:
  display_name: "SteadySpec Explore"
  short_description: "Activation entry - attention-ranked status or topical exploration with project history loaded"
  default_prompt: "Run SteadySpec explore-flow. With no topic, produce an attention-ranked status report (must-read decisions / active changes / debt aggregate / recent archived / recommended next verb), include docs contract health for docs substrate, and include a handoff snapshot when useful. With a topic, think with the user, load project history, and draft without canonizing a delegation boundary that distinguishes Authorized Outcome / Hard Constraints / Challengeable Assumptions / Proposed Means / Delegated Decisions plus open challenge owners. Do not freeze a suggested means into purpose. Hand off to propose if intent converges. Activates SteadySpec for the session."
