interface:
  display_name: "SteadySpec Explore"
  short_description: "Activation entry - attention-ranked status or topical exploration with project history loaded"
  default_prompt: "Run SteadySpec explore-flow. With no topic, produce an attention-ranked status report (must-read decisions / active changes / debt aggregate / recent archived / recommended next verb) and include a handoff snapshot when useful. With a topic, think with the user, load project history, identify likely decision owners and high-risk triggers, and hand off to propose if intent converges. Activates SteadySpec for the session."
