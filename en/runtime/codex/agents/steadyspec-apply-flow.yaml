interface:
  display_name: "SteadySpec Apply"
  short_description: "Implement a recorded change slice-by-slice with proof-linked decisions and re-slice events"
  default_prompt: "Run SteadySpec apply-flow on the given change-id. Loop slice-by-slice with TDD discipline (vertical slices, no refactor while RED, no anticipating next slice, refactor only after all GREEN). Link each proof signal to decision ledger entries. On drift, pause and offer four options: in-place patch / accept as known-limitation / revert this slice / STOP and recommend opening a new change. If slice shape changes, record a re-slice event and route high-risk scope/proof/user-visible changes to the user. Record evidence per slice. For docs substrate, run `steadyspec check <change-id-or-path> --phase apply --substrate docs` after updating evidence and report the result."
