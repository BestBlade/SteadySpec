interface:
  display_name: "SteadySpec Apply"
  short_description: "Implement a recorded change slice-by-slice with proof-linked decisions and re-slice events"
  default_prompt: "Run SteadySpec apply-flow on the given change-id. Before implementation, require a ready delegation boundary with concrete Authorized Outcome / Hard Constraints / Challengeable Assumptions / Proposed Means / Delegated Decisions and structured Challenge Resolution authority refs in change-relative path.md#markdown-anchor form; read back every target/heading inside the change. Stop on missing, placeholder, needs-human, unresolved, malformed/unbound ref, or Agent-self-authorized outcome/constraint state. Improve assumptions or means only within Delegated Decisions; technical superiority does not authorize changing Authorized Outcome or Hard Constraints. On every substrate, run `steadyspec delegation-check --change <repo-relative-change-path> --phase apply --json` before implementation and stop on non-zero; this is structural readback, not semantic truth or human acceptance. Loop slice-by-slice with TDD discipline, link proof to decisions, classify drift layers, route outcome/constraint changes to explicit authority, and record re-slice/evidence. For docs substrate, run `steadyspec check <change-id-or-path> --phase apply --substrate docs` after updating evidence for deterministic target/heading enforcement and report the result."
